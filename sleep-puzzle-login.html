<!DOCTYPE html>
<html lang="pl" data-theme="sleeppuzzle">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel – Sleep Puzzle</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;0,700;1,400;1,600&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/daisyui@4.12.10/dist/full.min.css" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<script>
tailwind.config = {
  theme: {
    extend: {
      fontFamily: {serif:['Cormorant Garamond','serif'],sans:['DM Sans','sans-serif']},
      colors: {brand:'#e8883a','brand-light':'#f0a55a',night:'#1c1610','night-s':'#251d13','night-s2':'#2e2418',cream:'#f0e8d8','cream-m':'#c8bfa8'}
    }
  }
}
</script>
<style>
  [data-theme="sleeppuzzle"]{--color-base-100:#1c1610;--color-base-200:#251d13;--color-base-300:#2e2418;--color-base-content:#c8bfa8;--color-primary:#e8883a;--color-primary-content:#1c1610;}
  *{font-family:'DM Sans',sans-serif;}
  .font-serif{font-family:'Cormorant Garamond',serif;}
  body::before{content:'';position:fixed;inset:0;pointer-events:none;z-index:0;background:radial-gradient(1px 1px at 7% 15%,rgba(240,232,216,.5) 0%,transparent 100%),radial-gradient(1.5px 1.5px at 52% 9%,rgba(240,232,216,.4) 0%,transparent 100%),radial-gradient(1px 1px at 81% 74%,rgba(240,232,216,.3) 0%,transparent 100%);}
  .lesson-row{display:flex;align-items:center;gap:16px;padding:16px;border-radius:14px;border:1px solid rgba(232,136,58,.12);transition:border-color .2s,transform .2s;cursor:pointer;}
  .lesson-row:hover{border-color:rgba(232,136,58,.35);transform:translateX(3px);}
  .lesson-row.locked{opacity:.4;cursor:not-allowed;}
  .lesson-row.locked:hover{transform:none;border-color:rgba(232,136,58,.12);}
</style>
</head>
<body class="bg-night text-cream-m min-h-screen">

<!-- NAV -->
<header class="fixed top-0 left-0 right-0 z-50 flex items-center justify-between px-8 py-4"
  style="background:rgba(28,22,16,.9);backdrop-filter:blur(12px);border-bottom:1px solid rgba(232,136,58,.08);">
  <a href="index.html" class="font-serif text-2xl tracking-wide" style="color:#e8883a;">Sleep <em class="text-cream">Puzzle</em></a>
  <div id="nav-right">
    <button onclick="showScreen('login')" class="text-xs uppercase tracking-widest text-cream-m/50 hover:text-brand transition-colors">Zaloguj się →</button>
  </div>
</header>

<!-- ════════════
     LOGIN
════════════ -->
<div id="screen-login" class="screen pt-20 min-h-screen flex items-center justify-center px-6">
  <div class="card w-full max-w-md mx-auto border" style="background:#251d13;border-color:rgba(232,136,58,.15);">
    <div class="card-body gap-5 p-10">
      <div class="text-center">
        <div class="text-5xl mb-4">🌙</div>
        <h2 class="font-serif text-3xl text-cream">Zaloguj się</h2>
        <p class="text-cream-m/50 text-sm mt-2">Dostęp do kursu video i panelu klienta</p>
      </div>
      <div class="form-control gap-1">
        <label class="label py-0"><span class="label-text text-cream-m/60 text-sm">Email</span></label>
        <input type="email" placeholder="twoj@email.pl" class="input input-bordered w-full" style="background:#2e2418;border-color:rgba(232,136,58,.2);color:#f0e8d8;">
      </div>
      <div class="form-control gap-1">
        <label class="label py-0"><span class="label-text text-cream-m/60 text-sm">Hasło</span></label>
        <input type="password" placeholder="••••••••" class="input input-bordered w-full" style="background:#2e2418;border-color:rgba(232,136,58,.2);color:#f0e8d8;">
        <div class="text-right mt-1"><a href="#" class="text-xs hover:underline" style="color:rgba(232,136,58,.6);">Zapomniałam/łem hasła</a></div>
      </div>
      <button onclick="showScreen('dashboard')" class="btn w-full font-semibold text-lg" style="background:#e8883a;border:none;color:#1c1610;">Zaloguj się</button>
      <div class="divider text-xs opacity-20 my-0">lub</div>
      <button class="btn btn-outline btn-block gap-3" style="border-color:rgba(240,232,216,.12);color:rgba(240,232,216,.5);">
        <svg class="w-4 h-4" viewBox="0 0 24 24"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
        Kontynuuj z Google
      </button>
      <p class="text-center text-sm text-cream-m/40">Nie masz konta? <a href="sleep-puzzle-register.html"  class="hover:underline" style="color:#e8883a;">Zarejestruj się</a></p>
    </div>
  </div>
</div>


  <!-- FOOTER -->
  <footer class="px-6 lg:px-20 py-10 mt-10 border-t" style="background:#251d13;border-color:rgba(232,136,58,.08);">
    <div class="max-w-5xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6">
      <a href="index.html" class="font-serif text-xl" style="color:#e8883a;">Sleep <em class="text-cream">Puzzle</em></a>
      <div class="flex items-center flex-wrap justify-center gap-6 text-xs uppercase tracking-widest text-cream-m/40">
        <a href="https://instagram.com" class="hover:text-brand transition-colors">Instagram</a>
        <a href="#" class="hover:text-brand transition-colors">Regulamin</a>
        <a href="#" class="hover:text-brand transition-colors">Polityka Prywatności</a>
      </div>
    </div>
  </footer>
</div>

<script>
  function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById('screen-' + id).classList.add('active');
    window.scrollTo(0,0);
    document.getElementById('nav-right').innerHTML = id === 'dashboard'
      ? '<button onclick="showScreen(\'login\')" class="text-xs uppercase tracking-widest text-cream-m/30 hover:text-brand transition-colors">Wyloguj →</button>'
      : '<button onclick="showScreen(\'login\')" class="text-xs uppercase tracking-widest text-cream-m/50 hover:text-brand transition-colors">Zaloguj się →</button>';
  }
</script>
</body>
</html>
